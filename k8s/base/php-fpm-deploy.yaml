apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-php
  namespace: portafolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laravel-php
  template:
    metadata:
      labels:
        app: laravel-php
    spec:
      containers:
        - name: php-fpm
          image: migbertweb/portafolio-app
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: laravel-config-env
            - secretRef:
                name: laravel-secret-env
          volumeMounts:
            - name: laravel-storage
              mountPath: /var/www/html
            - name: laravel-code
              mountPath: /var/www/html
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: laravel-storage
          persistentVolumeClaim:
            claimName: laravel-pvc
        - name: laravel-code
          persistentVolumeClaim:
            claimName: laravel-pvc
